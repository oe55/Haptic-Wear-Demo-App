<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#09090B">
<title>HapticWear</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#09090B;--s1:#111114;--s2:#1A1A1E;--b1:#222228;--wh:#FFFFFF;--lg:#CECED6;--mg:#5B5B5B;--dg:#2D2D2E}
body{background:var(--bg);color:var(--lg);font-family:'DM Mono',monospace;min-height:100vh;-webkit-tap-highlight-color:transparent}
.app{max-width:480px;margin:0 auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 0}
.logo{font-size:18px;font-weight:700;color:var(--wh);letter-spacing:1px}
.logo span{color:var(--mg);font-size:10px;font-weight:400;margin-left:6px;letter-spacing:2px}
.status{display:flex;align-items:center;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--mg);transition:all .3s}
.dot.on{background:#44cc66;box-shadow:0 0 8px #44cc6666}
.stxt{font-size:9px;color:var(--mg);letter-spacing:1px}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:12px;overflow:hidden}
.card-lbl{font-size:8px;color:var(--mg);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.viewport{width:100%;height:200px;border-radius:8px;overflow:hidden;background:var(--bg);position:relative;cursor:grab}
.viewport canvas{width:100%;height:100%;display:block}
.btn{width:100%;padding:12px;border:1px solid var(--b1);background:var(--s2);color:var(--wh);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;border-radius:8px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.btn:active{background:var(--b1);transform:scale(.98)}
.btn.on{border-color:#44cc6644;background:#44cc6610}
.btn-row{display:flex;gap:6px}
.btn-row .btn{flex:1}
.tabs{display:flex;gap:2px;background:var(--s2);border-radius:6px;padding:2px}
.tab{flex:1;padding:7px;font-size:8px;font-family:'DM Mono',monospace;color:var(--mg);background:transparent;border:none;border-radius:4px;cursor:pointer;text-align:center;letter-spacing:1px;transition:all .2s}
.tab.active{background:var(--b1);color:var(--wh)}
.vib-status{text-align:center;padding:16px;font-size:13px;font-weight:500;color:var(--mg);letter-spacing:2px;transition:all .2s}
.vib-status.active{color:var(--wh)}
.meter{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.meter-lbl{width:35px;font-size:8px;color:var(--mg);flex-shrink:0}
.meter-bar{flex:1;height:4px;background:var(--dg);border-radius:2px;overflow:hidden}
.meter-fill{height:100%;width:0%;transition:width 60ms linear;border-radius:2px}
.meter-fill.low{background:#7A9E8E}
.meter-fill.mid{background:#B8A88A}
.meter-fill.high{background:#8E8EB0}
.meter-fill.rms{background:var(--lg)}
.meter-val{width:30px;text-align:right;font-size:8px;color:var(--mg)}
.motor-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.motor-cell{background:var(--s2);border:1px solid var(--b1);border-radius:6px;padding:8px;text-align:center;transition:all .12s;position:relative;overflow:hidden}
.motor-cell::before{content:'';position:absolute;inset:0;background:radial-gradient(circle,rgba(206,206,214,.4) 0%,transparent 70%);opacity:0;transition:opacity .12s}
.motor-cell.on::before{opacity:var(--glow,0)}
.motor-id{font-size:10px;color:var(--wh);position:relative;z-index:1;font-weight:500}
.motor-pos{font-size:7px;color:var(--mg);margin-top:2px;position:relative;z-index:1}
.motor-pct{font-size:8px;color:var(--mg);margin-top:3px;position:relative;z-index:1}
.motor-label{font-size:7px;color:var(--mg);text-align:center;padding:2px 0;letter-spacing:1px}
.slider-row{display:flex;align-items:center;gap:6px;margin-top:4px}
.slider-lbl{font-size:8px;color:var(--mg);width:60px}
input[type=range]{flex:1;-webkit-appearance:none;height:2px;background:var(--dg);border-radius:1px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--lg);border-radius:50%;cursor:pointer}
.slider-val{font-size:8px;color:var(--mg);width:25px;text-align:right}
.dir-indicator{text-align:center;padding:6px;font-size:10px;color:var(--mg);letter-spacing:2px}
.dir-indicator.left{color:var(--wh)}
.dir-indicator.right{color:var(--wh)}
.footer{text-align:center;padding:8px 0;font-size:7px;color:var(--dg);letter-spacing:2px}
</style>
</head>
<body>
<div class="app">
<div class="hdr">
  <div class="logo">H<span>HAPTICWEAR</span></div>
  <div class="status"><div class="dot" id="dot"></div><div class="stxt" id="stxt">STANDBY</div></div>
</div>
 
<div class="card">
  <div class="card-lbl">3D MODEL</div>
  <div class="viewport" id="viewport"></div>
</div>
 
<div class="btn-row">
  <button class="btn" id="micBtn" onclick="toggleMic()">START</button>
  <button class="btn" id="bleBtn" onclick="toggleBLE()">CONNECT TO VEST</button>
</div>
 
<div class="card">
  <div class="card-lbl">SENSITIVITY</div>
  <div class="slider-row">
    <span class="slider-lbl">Level</span>
    <input type="range" id="sensSlider" min="1" max="30" value="12" oninput="sensitivity=this.value/10;document.getElementById('sensVal').textContent=sensitivity.toFixed(1)">
    <span class="slider-val" id="sensVal">1.2</span>
  </div>
</div>
 
<div class="card">
  <div class="card-lbl">MAPPING MODE</div>
  <div class="tabs">
    <button class="tab active" onclick="setMode('cross')" id="tC">CROSS-MODAL</button>
    <button class="tab" onclick="setMode('arb')" id="tA">ARBITRARY</button>
    <button class="tab" onclick="setMode('off')" id="tO">VIB OFF</button>
  </div>
</div>
 
<div class="card">
  <div class="vib-status" id="vibStatus">VIBRATION<br>QUIET</div>
</div>
 
<div class="card">
  <div class="card-lbl">AUDIO SPECTRUM</div>
  <div class="meter"><span class="meter-lbl">RMS</span><div class="meter-bar"><div class="meter-fill rms" id="fR"></div></div><span class="meter-val" id="vR">0</span></div>
  <div class="meter"><span class="meter-lbl">LOW</span><div class="meter-bar"><div class="meter-fill low" id="fL"></div></div><span class="meter-val" id="vL">0</span></div>
  <div class="meter"><span class="meter-lbl">MID</span><div class="meter-bar"><div class="meter-fill mid" id="fM"></div></div><span class="meter-val" id="vM">0</span></div>
  <div class="meter"><span class="meter-lbl">HIGH</span><div class="meter-bar"><div class="meter-fill high" id="fH"></div></div><span class="meter-val" id="vH">0</span></div>
</div>
 
<div class="card">
  <div class="card-lbl">MOTOR OUTPUT</div>
  <div class="motor-label">— FRONT —</div>
  <div class="motor-grid">
    <div class="motor-cell" id="m0"><div class="motor-id">M1</div><div class="motor-pos">UPPER LEFT</div><div class="motor-pct" id="p0">0%</div></div>
    <div class="motor-cell" id="m1"><div class="motor-id">M2</div><div class="motor-pos">LOWER RIGHT</div><div class="motor-pct" id="p1">0%</div></div>
  </div>
  <div class="motor-label" style="margin-top:5px">— BACK —</div>
  <div class="motor-grid">
    <div class="motor-cell" id="m2"><div class="motor-id">M3</div><div class="motor-pos">UPPER RIGHT</div><div class="motor-pct" id="p2">0%</div></div>
    <div class="motor-cell" id="m3"><div class="motor-id">M4</div><div class="motor-pos">LOWER LEFT</div><div class="motor-pct" id="p3">0%</div></div>
  </div>
</div>
 
<div class="card">
  <div class="card-lbl">NOISE GATE</div>
  <button class="btn" id="calBtn" onclick="calibrate()" style="font-size:9px;padding:8px">CALIBRATE</button>
  <div id="calInfo" style="font-size:8px;color:var(--mg);margin-top:6px;text-align:center">Not calibrated</div>
</div>
 
<div class="footer">HAPTICWEAR · BARC0038 · THE BARTLETT UCL · 2026</div>
</div>
 
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';
const vp=document.getElementById('viewport');
const scene=new THREE.Scene();scene.background=new THREE.Color(0x09090B);
const cam=new THREE.PerspectiveCamera(35,vp.clientWidth/vp.clientHeight,0.1,50);cam.position.set(0,0.2,2.8);
const ren=new THREE.WebGLRenderer({antialias:true});ren.setSize(vp.clientWidth,vp.clientHeight);ren.setPixelRatio(Math.min(window.devicePixelRatio,2));
vp.appendChild(ren.domElement);
scene.add(new THREE.AmbientLight(0xffffff,0.5));
const k=new THREE.DirectionalLight(0xfff8ee,0.9);k.position.set(3,4,3);scene.add(k);
const r2=new THREE.DirectionalLight(0xddeeff,0.4);r2.position.set(-3,2,-2);scene.add(r2);
const group=new THREE.Group();scene.add(group);
const mat=new THREE.MeshStandardMaterial({color:0x1a1a1e,roughness:0.7,metalness:0.1,transparent:true,opacity:0.55});
group.add(new THREE.Mesh(new THREE.CylinderGeometry(0.28,0.22,1.0,24),mat).translateY(0.25));
group.add(new THREE.Mesh(new THREE.CylinderGeometry(0.34,0.30,0.12,24),mat).translateY(0.64));
group.add(new THREE.Mesh(new THREE.CylinderGeometry(0.09,0.11,0.14,16),mat).translateY(0.82));
group.add(new THREE.Mesh(new THREE.SphereGeometry(0.12,16,12),mat).translateY(1.0));
group.add(new THREE.Mesh(new THREE.CylinderGeometry(0.282,0.222,1.01,24,6),new THREE.MeshBasicMaterial({color:0x2a2a30,wireframe:true,transparent:true,opacity:0.12})).translateY(0.25));
const grid=new THREE.GridHelper(4,30,0x111114,0x111114);grid.position.y=-0.85;scene.add(grid);
 
const mpos=[{x:-0.18,y:0.50,z:0.18},{x:0.16,y:0.05,z:0.20},{x:0.18,y:0.50,z:-0.16},{x:-0.16,y:0.05,z:-0.18}];
const pads=[];
mpos.forEach((p,i)=>{
  const dir=p.z>=0?new THREE.Vector3(0,0,1):new THREE.Vector3(0,0,-1);
  const rm=new THREE.MeshBasicMaterial({color:0xCECED6,transparent:true,opacity:0,side:THREE.DoubleSide,depthWrite:false});
  const ring=new THREE.Mesh(new THREE.RingGeometry(0.04,0.07,32),rm);
  ring.position.set(p.x,p.y,p.z);ring.lookAt(p.x+dir.x,p.y+dir.y,p.z+dir.z);group.add(ring);
  const cm=new THREE.MeshBasicMaterial({color:0xCECED6,transparent:true,opacity:0.03,side:THREE.DoubleSide,depthWrite:false});
  const core=new THREE.Mesh(new THREE.CircleGeometry(0.04,32),cm);
  core.position.set(p.x,p.y,p.z+(p.z>=0?0.001:-0.001));core.lookAt(p.x+dir.x,p.y+dir.y,p.z+dir.z);group.add(core);
  const c=document.createElement('canvas');c.width=64;c.height=32;const ctx=c.getContext('2d');
  ctx.fillStyle='#CECED6';ctx.font='500 14px monospace';ctx.textAlign='center';ctx.fillText('M'+(i+1),32,20);
  const spr=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),transparent:true,opacity:0.35}));
  spr.position.set(p.x,p.y+0.1,p.z);spr.scale.set(0.08,0.04,1);group.add(spr);
  pads.push({ring,rm,core,cm,spr,a:0});
});
window._pads=pads;
let autoR=true,dragS=null,rotY=0;
vp.addEventListener('pointerdown',e=>{dragS=e.clientX;autoR=false});
window.addEventListener('pointermove',e=>{if(dragS!==null){rotY+=(e.clientX-dragS)*0.01;dragS=e.clientX}});
window.addEventListener('pointerup',()=>{dragS=null;setTimeout(()=>autoR=true,3000)});
function anim(){requestAnimationFrame(anim);if(autoR)rotY+=0.003;group.rotation.y=rotY;
  const mv=window._mv||[0,0,0,0];
  pads.forEach((p,i)=>{const t=mv[i]/255;p.a+=(t-p.a)*0.2;const a=p.a;p.rm.opacity=a*0.7;p.cm.opacity=0.03+a*0.5;const s=1+a*0.4;p.ring.scale.set(s,s,s);p.spr.material.opacity=0.3+a*0.5});
  ren.render(scene,cam)}
anim();
window.addEventListener('resize',()=>{cam.aspect=vp.clientWidth/vp.clientHeight;cam.updateProjectionMatrix();ren.setSize(vp.clientWidth,vp.clientHeight)});
</script>
<script>
let audioCtx,analyser,micStream,srcNode,freqData,timeData;
let listening=false,bleDevice,bleChar,bleOn=false;
let mode='cross',noiseFloor=0,sensitivity=1.2;
window._mv=[0,0,0,0];
const FFT=2048;
 
async function toggleBLE(){
  if(bleOn){if(bleDevice&&bleDevice.gatt.connected)bleDevice.gatt.disconnect();bleOn=false;document.getElementById('bleBtn').textContent='CONNECT TO VEST';document.getElementById('bleBtn').classList.remove('on');setSt('STANDBY');return}
  try{setSt('SCANNING');
    bleDevice=await navigator.bluetooth.requestDevice({filters:[{name:'HapticWear'}],optionalServices:['19b10000-e8f2-537e-4f6c-d104768a1214']});
    setSt('CONNECTING');const srv=await bleDevice.gatt.connect();const svc=await srv.getPrimaryService('19b10000-e8f2-537e-4f6c-d104768a1214');
    bleChar=await svc.getCharacteristic('19b10001-e8f2-537e-4f6c-d104768a1214');
    bleOn=true;document.getElementById('bleBtn').textContent='DISCONNECT';document.getElementById('bleBtn').classList.add('on');setSt('CONNECTED');
    bleDevice.addEventListener('gattserverdisconnected',()=>{bleOn=false;document.getElementById('bleBtn').textContent='CONNECT TO VEST';document.getElementById('bleBtn').classList.remove('on');setSt('DISCONNECTED')});
  }catch(e){setSt('FAILED');console.error(e)}}
 
async function sendM(v){if(!bleOn||!bleChar)return;try{await bleChar.writeValueWithoutResponse(new Uint8Array(v).buffer)}catch(e){}}
 
async function toggleMic(){
  if(listening){if(micStream)micStream.getTracks().forEach(t=>t.stop());listening=false;document.getElementById('micBtn').textContent='START';document.getElementById('micBtn').classList.remove('on');return}
  if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)();analyser=audioCtx.createAnalyser();analyser.fftSize=FFT;analyser.smoothingTimeConstant=0.8;freqData=new Uint8Array(analyser.frequencyBinCount);timeData=new Uint8Array(analyser.fftSize)}
  if(audioCtx.state==='suspended')await audioCtx.resume();
  try{micStream=await navigator.mediaDevices.getUserMedia({audio:true});srcNode=audioCtx.createMediaStreamSource(micStream);srcNode.connect(analyser);listening=true;document.getElementById('micBtn').textContent='STOP';document.getElementById('micBtn').classList.add('on');setSt('LISTENING')}catch(e){setSt('MIC DENIED')}}
 
function calibrate(){
  if(!listening){alert('Start microphone first');return}
  document.getElementById('calInfo').textContent='Sampling...';
  let s=[],count=0;
  function sample(){if(count>=60){noiseFloor=s.reduce((a,b)=>a+b,0)/s.length*1.3;document.getElementById('calInfo').textContent='Floor: '+noiseFloor.toFixed(4);return}
    analyser.getByteTimeDomainData(timeData);let sq=0;for(let i=0;i<timeData.length;i++){const v=(timeData[i]-128)/128;sq+=v*v}s.push(Math.sqrt(sq/timeData.length));count++;requestAnimationFrame(sample)}
  sample()}
 
function extract(){
  if(!analyser||!listening)return{rms:0,low:0,mid:0,high:0};
  analyser.getByteFrequencyData(freqData);analyser.getByteTimeDomainData(timeData);
  const bins=analyser.frequencyBinCount,sr=audioCtx.sampleRate,bHz=sr/analyser.fftSize;
  let sq=0;for(let i=0;i<timeData.length;i++){const v=(timeData[i]-128)/128;sq+=v*v}
  let rms=Math.max(0,Math.sqrt(sq/timeData.length)-noiseFloor);
  let lS=0,lC=0,mS=0,mC=0,hS=0,hC=0;
  for(let i=0;i<bins;i++){const f=i*bHz,v=freqData[i]/255;if(f<300){lS+=v;lC++}else if(f<2000){mS+=v;mC++}else if(f<8000){hS+=v;hC++}}
  return{rms,low:lC?lS/lC:0,mid:mC?mS/mC:0,high:hC?hS/hC:0}}
 
function mapM(f){
  const{rms,low,mid,high}=f;const int=Math.min(rms*sensitivity*4,1);
  if(mode==='off')return[0,0,0,0];
  if(mode==='cross')return[min200(high*int*600),min200(low*int*600),min200(high*int*500),min200(low*int*500)];
  return[min200(low*int*600),min200(high*int*600),min200(mid*int*500),min200(mid*int*500)]}
function min200(v){return Math.min(200,Math.max(0,Math.round(v)))}
 
function updateUI(f,m){
  const s=(id,v,mx)=>document.getElementById(id).style.width=(Math.min(v/mx,1)*100)+'%';
  s('fR',f.rms,0.3);s('fL',f.low,0.5);s('fM',f.mid,0.5);s('fH',f.high,0.5);
  document.getElementById('vR').textContent=f.rms.toFixed(3);document.getElementById('vL').textContent=f.low.toFixed(2);
  document.getElementById('vM').textContent=f.mid.toFixed(2);document.getElementById('vH').textContent=f.high.toFixed(2);
  const total=m.reduce((a,b)=>a+b,0);const vs=document.getElementById('vibStatus');
  if(total>20){vs.textContent='VIBRATION\nACTIVE';vs.classList.add('active')}else{vs.textContent='VIBRATION\nQUIET';vs.classList.remove('active')}
  m.forEach((v,i)=>{const c=document.getElementById('m'+i);const pct=Math.round(v/255*100);c.classList.toggle('on',v>10);c.style.setProperty('--glow',(v/255*0.3).toFixed(3));document.getElementById('p'+i).textContent=pct+'%'})}
 
function setSt(t){document.getElementById('stxt').textContent=t;document.getElementById('dot').classList.toggle('on',['CONNECTED','LISTENING'].includes(t))}
window.setMode=function(m){mode=m;document.getElementById('tC').classList.toggle('active',m==='cross');document.getElementById('tA').classList.toggle('active',m==='arb');document.getElementById('tO').classList.toggle('active',m==='off')};
 
let throttle=0;
function loop(){requestAnimationFrame(loop);const f=extract();const m=mapM(f);window._mv=m;updateUI(f,m);
  if(listening&&mode!=='off'&&navigator.vibrate){const t=m.reduce((a,b)=>a+b,0);if(t>40)navigator.vibrate(30)}
  throttle++;if(throttle%2===0&&bleOn)sendM(m)}
loop();
</script>
</body>
</html>
